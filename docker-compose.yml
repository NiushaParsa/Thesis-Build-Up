services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: on-failure:0
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"    # REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  qdrant_data:
